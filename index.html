<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nunox Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0d1117; color: #c9d1d9; min-height: 100vh;
    }
    #login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #161b22; border: 1px solid #21262d; border-radius: 14px;
      padding: 40px 36px; width: 360px;
    }
    .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .logo span { background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 13px; color: #484f58; margin-bottom: 32px; }
    label { display: block; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; background: #0d1117;
      border: 1px solid #30363d; border-radius: 8px; color: #e6edf3;
      font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #58a6ff; }
    button {
      width: 100%; padding: 11px; background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none; border-radius: 8px; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error { font-size: 12px; color: #f85149; margin-top: 12px; text-align: center; min-height: 16px; }
    #dashboard-wrap { display: none; }
  </style>
</head>
<body>

<div id="login-wrap">
  <div class="login-card">
    <div class="logo"><span>Nunox</span></div>
    <div class="subtitle">Business Dashboard · Sign in to continue</div>
    <label>Email</label>
    <input type="email" id="uid" placeholder="you@nunox.io" autocomplete="username">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
    <button onclick="doLogin()">Sign In</button>
    <div class="error" id="err"></div>
  </div>
</div>

<div id="dashboard-wrap"></div>

<script>
const shouldUpgradeProtocol = window.location.protocol === 'http:' &&
  !['localhost', '127.0.0.1'].includes(window.location.hostname);
if (shouldUpgradeProtocol) {
  window.location.replace(window.location.href.replace(/^http:/, 'https:'));
}

const _AUTH_HASHES = [
  "e8dedae91ed0505719be1566f72a84542bdbb731062fbb36462b8daab767149f",
  "8d6a1a27345582135057aa7143fac3377143235699c4b316f6ae2cae4d72e93a"
];
async function sha256Hex(value) {
  if (!window.crypto || !window.crypto.subtle) {
    throw new Error('Secure login is not ready. Please reopen this page with HTTPS.');
  }
  const data = new TextEncoder().encode(value);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, '0')).join('');
}
async function doLogin() {
  const err = document.getElementById('err');
  try {
    if (shouldUpgradeProtocol) {
      err.textContent = 'Switching to secure login...';
      window.location.replace(window.location.href.replace(/^http:/, 'https:'));
      return;
    }
    const u = document.getElementById('uid').value.trim();
    const p = document.getElementById('pwd').value;
    const authHash = await sha256Hex(u + ':' + p);
    if (_AUTH_HASHES.includes(authHash)) {
      localStorage.setItem('nx_auth', authHash);
      window.location.href = 'dashboard.html';
    } else {
      err.textContent = 'Incorrect email or password.';
    }
  } catch (error) {
    err.textContent = error.message || 'Login failed. Please refresh and try again.';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
(async () => {
  if (_AUTH_HASHES.includes(localStorage.getItem('nx_auth'))) {
    window.location.replace('dashboard.html');
  }
})();
</script>
</body>
</html>
