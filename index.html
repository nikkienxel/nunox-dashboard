<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nunox Dashboard — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0d1117; color: #c9d1d9; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #161b22; border: 1px solid #21262d; border-radius: 14px;
      padding: 40px 36px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .logo span { background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: 13px; color: #484f58; margin-bottom: 32px; }
    label { display: block; font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; background: #0d1117;
      border: 1px solid #30363d; border-radius: 8px; color: #e6edf3;
      font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #58a6ff; }
    button {
      width: 100%; padding: 11px; background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none; border-radius: 8px; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .err { font-size: 12px; color: #f85149; margin-top: 12px; text-align: center; min-height: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><span>Nunox</span></div>
  <div class="sub">Business Dashboard · Sign in to continue</div>
  <label>Email</label>
  <input type="email" id="u" placeholder="you@nunox.io" autocomplete="username">
  <label>Password</label>
  <input type="password" id="p" placeholder="••••••••" autocomplete="current-password">
  <button onclick="go()">Sign In</button>
  <div class="err" id="e"></div>
</div>
<script>
function go() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  try {
    var tok = btoa(u + ':' + p);
    if (tok === 'amFjQG51bm94LmlvOm51bm9YOTM2MjM2NDI=') {
      sessionStorage.setItem('nx_auth', tok);
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('e').textContent = 'Incorrect email or password.';
    }
  } catch(e) {
    document.getElementById('e').textContent = 'Login error: ' + e.message;
  }
}
document.addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
// Already logged in?
if (sessionStorage.getItem('nx_auth') === 'amFjQG51bm94LmlvOm51bm9YOTM2MjM2NDI=') {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
