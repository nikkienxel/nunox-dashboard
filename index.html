<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nunox Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0d1117; color: #c9d1d9; min-height: 100vh;
    }
    #login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #161b22; border: 1px solid #21262d; border-radius: 14px;
      padding: 40px 36px; width: 360px;
    }
    .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .logo span { background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 13px; color: #484f58; margin-bottom: 32px; }
    label { display: block; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; background: #0d1117;
      border: 1px solid #30363d; border-radius: 8px; color: #e6edf3;
      font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #58a6ff; }
    button {
      width: 100%; padding: 11px; background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none; border-radius: 8px; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error { font-size: 12px; color: #f85149; margin-top: 12px; text-align: center; min-height: 16px; }
    #dashboard-wrap { display: none; }
  </style>
</head>
<body>

<div id="login-wrap">
  <div class="login-card">
    <div class="logo"><span>Nunox</span></div>
    <div class="subtitle">Business Dashboard · Sign in to continue</div>
    <form id="login-form" onsubmit="return false;">
      <label>Email</label>
      <input type="email" id="uid" placeholder="you@nunox.io" autocomplete="username">
      <label>Password</label>
      <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
      <button type="submit" id="login-btn">Sign In</button>
    </form>
    <div class="error" id="err"></div>
  </div>
</div>

<div id="dashboard-wrap"></div>

<script>
const _T = 'amFjQG51bm94LmlvOm51bm9YOTM2MjM2NDI=';
function doLogin() {
  const u = document.getElementById('uid').value.trim();
  const p = document.getElementById('pwd').value;
  if (btoa(u + ':' + p) === _T) {
    sessionStorage.setItem('nx_auth', _T);
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('err').textContent = 'Incorrect email or password.';
  }
}
document.addEventListener('DOMContentLoaded', function() {
  // If already logged in, go straight to dashboard
  if (sessionStorage.getItem('nx_auth') === _T) {
    window.location.href = 'dashboard.html';
    return;
  }
  document.getElementById('login-form').addEventListener('submit', doLogin);
  document.getElementById('login-btn').addEventListener('click', doLogin);
});
</script>
</body>
</html>
